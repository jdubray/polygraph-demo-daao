<text x="28" y="42" font-size="24" font-weight="600" fill="#0b0b0b">The gate manufactures the repro — planted two-person bug</text><text x="28" y="66" font-size="14" fill="#52514e">Distinct-approver guard deleted; model checking finds the shortest path to the violation. No test was written.</text><rect x="32" y="110" width="258" height="168" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="1.8"/><text x="46" y="138" font-size="13" fill="#52514e">step 0 — init</text><text x="46" y="166" font-size="17" font-weight="700" fill="#0b0b0b">DRAFT</text><text x="46" y="194" font-size="13.5" fill="#0b0b0b">approvers: []</text><text x="46" y="216" font-size="13.5" fill="#52514e">distinct: 0</text><text x="46" y="238" font-size="13.5" fill="#52514e">proposer: —</text><line x1="294" y1="194" x2="319" y2="194" stroke="#52514e" stroke-width="2" marker-end="url(#arr)"/><rect x="324" y="110" width="258" height="168" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="1.8"/><text x="338" y="138" font-size="13" fill="#52514e">step 1 — submit(alice, window 10–100)</text><text x="338" y="166" font-size="17" font-weight="700" fill="#0b0b0b">PENDING_APPROVAL</text><text x="338" y="194" font-size="13.5" fill="#0b0b0b">approvers: []</text><text x="338" y="216" font-size="13.5" fill="#52514e">distinct: 0</text><text x="338" y="238" font-size="13.5" fill="#52514e">proposer: alice</text><line x1="586" y1="194" x2="611" y2="194" stroke="#52514e" stroke-width="2" marker-end="url(#arr)"/><rect x="616" y="110" width="258" height="168" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="1.8"/><text x="630" y="138" font-size="13" fill="#52514e">step 2 — approve(bob, t=50)</text><text x="630" y="166" font-size="17" font-weight="700" fill="#0b0b0b">PENDING_APPROVAL</text><text x="630" y="194" font-size="13.5" fill="#0b0b0b">approvers: [bob]</text><text x="630" y="216" font-size="13.5" fill="#52514e">distinct: 1</text><text x="630" y="238" font-size="13.5" fill="#52514e">proposer: alice</text><line x1="878" y1="194" x2="903" y2="194" stroke="#d03b3b" stroke-width="2" marker-end="url(#arrR)"/><rect x="908" y="110" width="258" height="168" rx="10" fill="#ffffff" stroke="#d03b3b" stroke-width="2.6"/><text x="922" y="138" font-size="13" fill="#52514e">step 3 — approve(bob, t=50) again</text><text x="922" y="166" font-size="17" font-weight="700" fill="#d03b3b">APPROVED</text><text x="922" y="194" font-size="13.5" fill="#0b0b0b">approvers: [bob, bob]</text><text x="922" y="216" font-size="13.5" fill="#d03b3b">distinct: 1  — needs 2</text><text x="922" y="238" font-size="13.5" fill="#52514e">proposer: alice</text><text x="922" y="262" font-size="13" font-weight="600" fill="#d03b3b">⚠ AUTHORIZED with one approver</text><rect x="32" y="344" width="1136" height="150" rx="10" fill="#d03b3b" opacity="0.06"/><text x="52" y="378" font-size="15" font-weight="700" fill="#d03b3b">✗ 3 invariants violated — reported with this shortest path as the ready-made repro</text><text x="52" y="412" font-size="14.5" fill="#0b0b0b">✗ <tspan font-weight="600">S5-authorized-only-earned</tspan></text><text x="612" y="412" font-size="14.5" fill="#0b0b0b">✗ <tspan font-weight="600">S1-two-person-integrity</tspan></text><text x="52" y="442" font-size="14.5" fill="#0b0b0b">✗ <tspan font-weight="600">S1-approvers-distinct</tspan></text><text x="52" y="474" font-size="13.5" fill="#52514e">The clean build passes the identical gate (28 states, 0 violations). Same contract, same rules — the code is the only variable.</text><text x="28" y="614" font-size="12.5" fill="#52514e">Live output of check.mjs --json on daao/verify/controls/next_buggy.cjs (46 states explored). The bug is planted and disclosed.</text></svg>