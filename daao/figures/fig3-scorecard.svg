<text x="28" y="42" font-size="24" font-weight="600" fill="#0b0b0b">One machine, every gate — the develop-and-verify lifecycle</text><text x="28" y="66" font-size="14" fill="#52514e">All runs real and reproducible (daao/run_demo.sh). Red is the gate succeeding: a planted defect caught, an unsafe deploy blocked.</text><text x="28" y="118" font-size="15" font-weight="700" fill="#0b0b0b">polygen — author</text><text x="330" y="118" font-size="14" fill="#52514e">Fable 5 authors the machine from one paragraph; self-check</text><rect x="868" y="98" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="119" font-size="13.5" font-weight="600" fill="#0ca30c">✓ converged, iteration 0</text><line x1="28" y1="144" x2="1172" y2="144" stroke="#e4e3df" stroke-width="1"/><text x="28" y="174" font-size="15" font-weight="700" fill="#0b0b0b">polynv — elicit intent</text><text x="330" y="174" font-size="14" fill="#52514e">96 candidate rules pre-checked, human-dispositioned</text><rect x="868" y="154" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="175" font-size="13.5" font-weight="600" fill="#0ca30c">✓ CONVERGED · 5 confirmed / 91 rejected</text><line x1="28" y1="200" x2="1172" y2="200" stroke="#e4e3df" stroke-width="1"/><text x="28" y="230" font-size="15" font-weight="700" fill="#0b0b0b">polynv — grade</text><text x="330" y="230" font-size="14" fill="#52514e">mutation adequacy of the invariant set</text><rect x="868" y="210" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="231" font-size="13.5" font-weight="600" fill="#0ca30c">✓ 24/38 killed (11 → 21 → 24)</text><line x1="28" y1="256" x2="1172" y2="256" stroke="#e4e3df" stroke-width="1"/><text x="28" y="286" font-size="15" font-weight="700" fill="#0b0b0b">polygraph — model-check</text><text x="330" y="286" font-size="14" fill="#52514e">every reachable state vs S1–S5</text><rect x="868" y="266" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="287" font-size="13.5" font-weight="600" fill="#0ca30c">✓ clean: 28 states, 0 violations</text><line x1="28" y1="312" x2="1172" y2="312" stroke="#e4e3df" stroke-width="1"/><text x="28" y="342" font-size="15" font-weight="700" fill="#0b0b0b">polygraph — planted bug</text><text x="330" y="342" font-size="14" fill="#52514e">distinct-approver guard deleted</text><rect x="868" y="322" width="304" height="30" rx="15" fill="#d03b3b" opacity="0.1"/><text x="884" y="343" font-size="13.5" font-weight="600" fill="#d03b3b">✗ CAUGHT: 3 violations + 3-step repro</text><line x1="28" y1="368" x2="1172" y2="368" stroke="#e4e3df" stroke-width="1"/><text x="28" y="398" font-size="15" font-weight="700" fill="#0b0b0b">polygraph — differential</text><text x="330" y="398" font-size="14" fill="#52514e">3 independent LLM readings replayed on 54 windows</text><rect x="868" y="378" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="399" font-size="13.5" font-weight="600" fill="#0ca30c">✓ clean 54/54 · buggy flagged</text><line x1="28" y1="424" x2="1172" y2="424" stroke="#e4e3df" stroke-width="1"/><text x="28" y="454" font-size="15" font-weight="700" fill="#0b0b0b">reachability — liveness</text><text x="330" y="454" font-size="14" fill="#52514e">recall available · progress · no dead-ends</text><rect x="868" y="434" width="304" height="30" rx="15" fill="#0ca30c" opacity="0.1"/><text x="884" y="455" font-size="13.5" font-weight="600" fill="#0ca30c">✓ L1, L2, S4 all hold</text><line x1="28" y1="480" x2="1172" y2="480" stroke="#e4e3df" stroke-width="1"/><text x="28" y="510" font-size="15" font-weight="700" fill="#0b0b0b">polyvers — version gate</text><text x="330" y="510" font-size="14" fill="#52514e">tighten 2→3 approvers vs 5 in-flight orders</text><rect x="868" y="490" width="304" height="30" rx="15" fill="#d03b3b" opacity="0.1"/><text x="884" y="511" font-size="13.5" font-weight="600" fill="#d03b3b">✗ DEPLOY BLOCKED: 4 landmines named</text><text x="28" y="584" font-size="14.5" font-weight="600" fill="#0b0b0b">Total frontier-model spend for everything above: $1.81.</text><text x="28" y="614" font-size="12.5" fill="#52514e">Verdicts from daao/POLYGRAPH-REPORT.md, POLYGEN-REPORT.md, verify/INTENT-LOG.md and out/compat/ — every number is from an actual run.</text></svg>