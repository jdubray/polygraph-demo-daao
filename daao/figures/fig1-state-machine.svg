="18.5" fill="#fcfcfb" opacity="0.92"/><text x="1250" y="280" font-size="12.5" fill="#52514e" text-anchor="start" font-weight="400">close</text><path d="M 284 148 C 270 108, 350 108, 336 146" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#arr)"/><rect x="228" y="90.5" width="164.00000000000003" height="18.5" fill="#fcfcfb" opacity="0.92"/><text x="310" y="102" font-size="12.5" fill="#52514e" text-anchor="middle" font-weight="400">approve (1st distinct)</text><rect x="249.16" y="455" width="305.68" height="18" fill="#fcfcfb" opacity="0.92"/><text x="402" y="466" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">abort — recall, any pre-execution state (L1)</text><rect x="707.56" y="455" width="204.88000000000002" height="18" fill="#fcfcfb" opacity="0.92"/><text x="810" y="466" font-size="12" fill="#52514e" text-anchor="middle" font-weight="600">expire — only past window end</text><rect x="30" y="150" width="92" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="76" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">DRAFT</text><rect x="212" y="150" width="196" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="310" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">PENDING_APPROVAL</text><rect x="498" y="150" width="122" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="559" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">APPROVED</text><rect x="710" y="150" width="118" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="769" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">RELEASED</text><rect x="918" y="150" width="168" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="1002" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">ACKNOWLEDGED</text><rect x="1176" y="150" width="120" height="44" rx="9" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="1236" y="178" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">EXECUTED</text><rect x="1188" y="330" width="96" height="44" rx="9" fill="#f0efeb" stroke="#52514e" stroke-width="1.4"/><text x="1236" y="358" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">CLOSED</text><rect x="350" y="480" width="104" height="44" rx="9" fill="#f0efeb" stroke="#52514e" stroke-width="1.4"/><text x="402" y="508" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">ABORTED</text><rect x="760" y="480" width="100" height="44" rx="9" fill="#f0efeb" stroke="#52514e" stroke-width="1.4"/><text x="810" y="508" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="600">EXPIRED</text><rect x="26" y="568" width="614.2400000000001" height="19" fill="#fcfcfb" opacity="0.92"/><text x="30" y="580" font-size="13" fill="#52514e" text-anchor="start" font-weight="400">Every action that does not apply is an observable reject(reason) — no silent paths.</text><text x="28" y="624" font-size="12.5" fill="#52514e">Derived from daao/verify/next.cjs + contract.json — the edge set is BFS-checked against the machine at generation time. Terminal states are absorbing.</text></svg>