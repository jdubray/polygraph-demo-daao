<text x="28" y="42" font-size="24" font-weight="600" fill="#0b0b0b">DAAO — the verified state machine</text><text x="28" y="66" font-size="14" fill="#52514e">9 states · 28 reachable (state, data) configurations · model-checked against S1–S5, liveness via reachability</text><rect x="490" y="136" width="814" height="72" rx="10" fill="#2a78d6" opacity="0.07"/><line x1="286" y1="196" x2="402" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.5" marker-end="url(#arr)"/><line x1="334" y1="196" x2="810" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.35" stroke-dasharray="5 4" marker-end="url(#arr)"/><line x1="535" y1="196" x2="402" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.5" marker-end="url(#arr)"/><line x1="583" y1="196" x2="810" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.35" stroke-dasharray="5 4" marker-end="url(#arr)"/><line x1="745" y1="196" x2="402" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.5" marker-end="url(#arr)"/><line x1="793" y1="196" x2="810" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.35" stroke-dasharray="5 4" marker-end="url(#arr)"/><line x1="978" y1="196" x2="402" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.5" marker-end="url(#arr)"/><line x1="1026" y1="196" x2="810" y2="477" stroke="#52514e" stroke-width="1.1" opacity="0.35" stroke-dasharray="5 4" marker-end="url(#arr)"/><line x1="124" y1="172" x2="209" y2="172" stroke="#52514e" stroke-width="1.6" marker-end="url(#arr)"/><rect x="141" y="128.5" width="52.00000000000001" height="18.5" fill="#fcfcfb" opacity="0.92"/><text x="167" y="140" font-size="12.5" fill="#52514e" text-anchor="middle" font-weight="400">submit</text><line x1="410" y1="172" x2="495" y2="172" stroke="#52514e" stroke-width="1.6" marker-end="url(#arr)"/><rect x="371" y="128.5" width="164.00000000000003" height="18.5" fill="#fcfcfb" opacity="0.92"/><text x="453" y="140" font-size="12.5" fill="#52514e" text-anchor="middle" font-weight="400">approve (2nd distinct)